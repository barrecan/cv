name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate static site
        run: |
          test -f index.html
          test -f CNAME
          test -f .nojekyll
          test -f static/css/layout.css
          grep -q "Nick Barreca" index.html
          grep -q "barrecan.com" CNAME
