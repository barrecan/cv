name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate static site
        run: |
          test -f index.html
          test -f CNAME
          test -f .nojekyll
          test -f sitemap.xml
          test -f robots.txt
          test -f static/css/layout.css
          grep -q "Nick Barreca" index.html
          grep -q "barrecan.com" CNAME
