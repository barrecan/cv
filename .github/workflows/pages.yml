name: Build and deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate static site
        run: |
          test -f index.html
          test -f CNAME
          test -f .nojekyll
          test -f sitemap.xml
          test -f robots.txt
          test -f static/css/layout.css
          grep -q "Nick Barreca" index.html
          grep -q "barrecan.com" CNAME

      - name: Package site
        run: |
          mkdir site
          cp index.html 404.html CNAME favicon.ico .nojekyll sitemap.xml robots.txt site/
          cp -R static site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
